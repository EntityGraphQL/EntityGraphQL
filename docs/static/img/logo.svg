<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- EntityGraphQL: GraphQL's hexagon graph with an entity (database) at its centre -->
  <path d="M64 10 112 37.5v55L64 120 16 92.5v-55Z" fill="none" stroke="#2e8555" stroke-width="7" stroke-linejoin="round"/>
  <!-- graph nodes on the hexagon vertices -->
  <circle cx="64" cy="10" r="8" fill="#205d3b"/>
  <circle cx="112" cy="37.5" r="8" fill="#205d3b"/>
  <circle cx="112" cy="92.5" r="8" fill="#205d3b"/>
  <circle cx="64" cy="120" r="8" fill="#205d3b"/>
  <circle cx="16" cy="92.5" r="8" fill="#205d3b"/>
  <circle cx="16" cy="37.5" r="8" fill="#205d3b"/>
  <!-- database cylinder, optically centred in the hexagon (vertical centre y=65) -->
  <path d="M44 48v34a20 8.5 0 0 0 40 0V48Z" fill="#29784c"/>
  <ellipse cx="64" cy="48" rx="20" ry="8.5" fill="#52c188"/>
  <path d="M44 62a20 8.5 0 0 0 40 0" fill="none" stroke="#52c188" stroke-width="3.5"/>
  <path d="M44 76a20 8.5 0 0 0 40 0" fill="none" stroke="#52c188" stroke-width="3.5"/>
</svg>
